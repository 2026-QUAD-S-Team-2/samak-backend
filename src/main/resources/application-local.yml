spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/samak-db
    username: admin
    password: adminpw

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: true
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    defer-datasource-initialization: true

  main:
    allow-bean-definition-overriding: true

  data:
    redis:
      host: localhost
      port: 6380

logging:
  level:
    org.hibernate.type.descriptor.sql: trace
    org.hibernate.orm.query: off
jwt:
  secret-key: csdBLefFvRADK9X/174xJV8JEnNuiiAiRJLEWpsmqWM=
  access-expiration-time: 864000000


security:
  whitelist:
    - /
    - /swagger-ui/**
    - /v3/api-docs/**
    - /login/oauth2/code/**
    - /api/v1/auth/**
    - /api/v1/images/**
    - /api/v1/test/login